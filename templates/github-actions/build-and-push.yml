name: Build & Push Images to Docker Hub

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  DOCKER_HUB_USERNAME: m_ran66
  BACKEND_IMAGE: m_ran66/k8s-backend
  FRONTEND_IMAGE: m_ran66/k8s-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (multi-platform builds, better caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to Docker Hub
      - name: Log in to Docker Hub
        if: github.event_name == 'push'  # Only push on actual push, not PR
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 4. Extract metadata (tags, labels)
      - name: Extract backend metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract frontend metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # 5. Build and push backend image
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}  # Push only on actual push
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=registry,ref=docker.io/${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=docker.io/${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      # 6. Build and push frontend image
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}  # Push only on actual push
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=registry,ref=docker.io/${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=docker.io/${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

      # 7. Display pushed images
      - name: Image digest
        run: |
          echo "Backend image: ${{ env.BACKEND_IMAGE }}"
          echo "Frontend image: ${{ env.FRONTEND_IMAGE }}"
          echo "Tags: ${{ steps.backend-meta.outputs.tags }}"
